<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0f172a" />
  <title>Sign Up | Atmosphere</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="signin.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo" onclick="window.location.href='index.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <span>Atmosphere</span>
        </div>
        <h1>Create Account</h1>
        <p>Join us for personalized weather updates</p>
      </div>

      <div id="error-message" class="error-message" role="alert"></div>

      <form id="signup-form" onsubmit="event.preventDefault(); handleSignup();">
        <div class="form-row">
          <div class="form-group">
            <label for="name">First Name</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
              <input type="text" id="name" placeholder="John" required />
            </div>
          </div>
          
          <div class="form-group">
            <label for="surname">Last Name</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
              <input type="text" id="surname" placeholder="Doe" required />
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
            <input 
              type="email" 
              id="email" 
              placeholder="you@example.com" 
              required
              autocomplete="email"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Create Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input 
              type="password" 
              id="password" 
              placeholder="Min 6 characters" 
              required
              minlength="6"
              autocomplete="new-password"
            />
            <button type="button" class="toggle-password" onclick="togglePassword('password')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="password-strength" id="password-strength"></div>
        </div>

        <div class="form-group">
          <label class="terms">
            <input type="checkbox" id="terms" required />
            <span>I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a></span>
          </label>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">
          <span>Create Account</span>
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="signin.html">Sign In</a></p>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script>
    function togglePassword(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // Password strength indicator
    document.getElementById('password').addEventListener('input', function(e) {
      const val = e.target.value;
      const strength = document.getElementById('password-strength');
      let strengthClass = '';
      let strengthText = '';
      
      if (val.length < 6) {
        strengthClass = 'weak';
        strengthText = 'Too short';
      } else if (val.match(/[a-z]/) && val.match(/[A-Z]/) && val.match(/[0-9]/)) {
        strengthClass = 'strong';
        strengthText = 'Strong password';
      } else {
        strengthClass = 'medium';
        strengthText = 'Could be stronger';
      }
      
      strength.className = 'password-strength ' + strengthClass;
      strength.textContent = strengthText;
    });

    function handleSignup() {
      const name = document.getElementById('name').value.trim();
      const surname = document.getElementById('surname').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const terms = document.getElementById('terms').checked;
      const submitBtn = document.getElementById('submit-btn');
      const errorMsg = document.getElementById('error-message');

      // Reset error
      errorMsg.style.display = 'none';
      errorMsg.textContent = '';

      // Validation
      if (!name || !surname || !email || !password) {
        errorMsg.textContent = 'Please fill in all fields';
        errorMsg.style.display = 'flex';
        return;
      }

      if (password.length < 6) {
        errorMsg.textContent = 'Password must be at least 6 characters';
        errorMsg.style.display = 'flex';
        return;
      }

      if (!terms) {
        errorMsg.textContent = 'Please accept the terms';
        errorMsg.style.display = 'flex';
        return;
      }

      // Loading state
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<div class="spinner"></div>';

      setTimeout(() => {
        let users = JSON.parse(localStorage.getItem('weatherUsers')) || [];
        
        if (users.some(u => u.email === email)) {
          errorMsg.textContent = 'Email already registered';
          errorMsg.style.display = 'flex';
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<span>Create Account</span><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
          return;
        }

        // Prompt for home city
        const homeCity = prompt(`Welcome, ${name}! What's your home city? (optional)`) || '';

        const newUser = {
          name,
          surname,
          email,
          password,
          homeCity,
          favorites: [],
          createdAt: new Date().toISOString()
        };

        users.push(newUser);
        localStorage.setItem('weatherUsers', JSON.stringify(users));
        localStorage.setItem('signedIn', 'true');
        localStorage.setItem('weatherUser', JSON.stringify(newUser));

        showToast('Account created successfully!', 'success');
        setTimeout(() => window.location.href = 'index.html', 1500);
      }, 800);
    }
  </script>
</body>
</html>
