<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0f172a" />
  <title>Sign In | Atmosphere</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="signin.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo" onclick="window.location.href='index.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <span>Atmosphere</span>
        </div>
        <h1>Welcome Back</h1>
        <p>Sign in to access your saved locations</p>
      </div>

      <div id="error-message" class="error-message" role="alert"></div>

      <form id="signin-form" onsubmit="event.preventDefault(); handleSignin();">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
            <input 
              type="email" 
              id="email" 
              placeholder="you@example.com" 
              required
              autocomplete="email"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input 
              type="password" 
              id="password" 
              placeholder="Enter your password" 
              required
              autocomplete="current-password"
            />
            <button type="button" class="toggle-password" onclick="togglePassword('password')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="remember" />
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link" onclick="showToast('Feature coming soon!')">Forgot password?</a>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">
          <span>Sign In</span>
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script>
    function togglePassword(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function handleSignin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('submit-btn');
      const errorMsg = document.getElementById('error-message');

      // Reset error
      errorMsg.style.display = 'none';
      errorMsg.textContent = '';

      // Validate
      if (!email || !password) {
        errorMsg.textContent = 'Please fill in all fields';
        errorMsg.style.display = 'flex';
        return;
      }

      // Loading state
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<div class="spinner"></div>';

      // Simulate API call delay
      setTimeout(() => {
        const users = JSON.parse(localStorage.getItem('weatherUsers')) || [];
        const user = users.find(u => u.email === email && u.password === password);

        if (user) {
          localStorage.setItem('signedIn', 'true');
          localStorage.setItem('weatherUser', JSON.stringify(user));
          showToast(`Welcome back, ${user.name}!`, 'success');
          setTimeout(() => window.location.href = 'index.html', 1000);
        } else {
          errorMsg.textContent = 'Invalid email or password';
          errorMsg.style.display = 'flex';
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<span>Sign In</span><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
        }
      }, 800);
    }

    // Check if already signed in
    if (localStorage.getItem('signedIn') === 'true') {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
